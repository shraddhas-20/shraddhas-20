<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05060f"/>
      <stop offset="45%" stop-color="#150a2e"/>
      <stop offset="100%" stop-color="#06070f"/>
    </linearGradient>
    <radialGradient id="planetGrad1" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff9ecb"/>
      <stop offset="55%" stop-color="#c06bff"/>
      <stop offset="100%" stop-color="#4a1f8f"/>
    </radialGradient>
    <radialGradient id="planetGrad2" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#8fe9ff"/>
      <stop offset="55%" stop-color="#3fa9f5"/>
      <stop offset="100%" stop-color="#123a70"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD36E"/>
      <stop offset="50%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#C06BFF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes twinkle { 0%,100%{opacity:.15} 50%{opacity:1} }
      @keyframes float { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-14px)} }
      @keyframes drift { 0%,100%{transform:translateX(0px)} 50%{transform:translateX(10px)} }
      @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      @keyframes shoot1 { 0%{transform:translate(-60px,-40px);opacity:0} 4%{opacity:1} 22%{transform:translate(340px,180px);opacity:0} 100%{opacity:0} }
      @keyframes shoot2 { 0%{transform:translate(-60px,-40px);opacity:0} 4%{opacity:1} 22%{transform:translate(300px,160px);opacity:0} 100%{opacity:0} }
      .star{ fill:#ffffff; animation:twinkle 3.2s ease-in-out infinite; }
      .planet-a{ animation: float 7s ease-in-out infinite; transform-origin: 190px 90px; }
      .planet-b{ animation: float 8.5s ease-in-out infinite; transform-origin: 1030px 220px; }
      .ring{ animation: spin 22s linear infinite; transform-origin: 1030px 220px; }
      .comet-1{ animation: shoot1 6s ease-in infinite; animation-delay: .5s; }
      .comet-2{ animation: shoot2 9s ease-in infinite; animation-delay: 3.2s; }
      .title{ font-family: Verdana, Geneva, sans-serif; font-weight: 700; }
      .subtitle{ font-family: 'Trebuchet MS', sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="320" fill="url(#bgGrad)"/>

  <!-- starfield -->
  <g>
    <circle class="star" cx="40" cy="30" r="1.6" style="animation-delay:.1s"/>
    <circle class="star" cx="95" cy="70" r="1.1" style="animation-delay:1.3s"/>
    <circle class="star" cx="160" cy="25" r="1.8" style="animation-delay:.6s"/>
    <circle class="star" cx="230" cy="60" r="1.2" style="animation-delay:2.1s"/>
    <circle class="star" cx="300" cy="20" r="1.4" style="animation-delay:.9s"/>
    <circle class="star" cx="370" cy="55" r="1.7" style="animation-delay:1.7s"/>
    <circle class="star" cx="420" cy="15" r="1.1" style="animation-delay:.3s"/>
    <circle class="star" cx="500" cy="45" r="1.5" style="animation-delay:2.5s"/>
    <circle class="star" cx="560" cy="18" r="1.2" style="animation-delay:1.1s"/>
    <circle class="star" cx="640" cy="60" r="1.6" style="animation-delay:.4s"/>
    <circle class="star" cx="700" cy="25" r="1.3" style="animation-delay:1.9s"/>
    <circle class="star" cx="770" cy="50" r="1.8" style="animation-delay:.8s"/>
    <circle class="star" cx="840" cy="20" r="1.1" style="animation-delay:2.3s"/>
    <circle class="star" cx="900" cy="65" r="1.5" style="animation-delay:1.4s"/>
    <circle class="star" cx="960" cy="30" r="1.2" style="animation-delay:.2s"/>
    <circle class="star" cx="1020" cy="55" r="1.7" style="animation-delay:1.6s"/>
    <circle class="star" cx="1090" cy="22" r="1.3" style="animation-delay:2.7s"/>
    <circle class="star" cx="1150" cy="60" r="1.6" style="animation-delay:.7s"/>
    <circle class="star" cx="70" cy="260" r="1.4" style="animation-delay:1.2s"/>
    <circle class="star" cx="150" cy="290" r="1.1" style="animation-delay:2.0s"/>
    <circle class="star" cx="260" cy="270" r="1.6" style="animation-delay:.5s"/>
    <circle class="star" cx="340" cy="300" r="1.2" style="animation-delay:1.8s"/>
    <circle class="star" cx="470" cy="280" r="1.5" style="animation-delay:.9s"/>
    <circle class="star" cx="600" cy="295" r="1.3" style="animation-delay:2.4s"/>
    <circle class="star" cx="720" cy="265" r="1.7" style="animation-delay:1.0s"/>
    <circle class="star" cx="830" cy="290" r="1.2" style="animation-delay:.3s"/>
    <circle class="star" cx="940" cy="275" r="1.6" style="animation-delay:1.5s"/>
    <circle class="star" cx="1060" cy="295" r="1.3" style="animation-delay:2.2s"/>
    <circle class="star" cx="1140" cy="270" r="1.5" style="animation-delay:.6s"/>
  </g>

  <!-- comets -->
  <g class="comet-1">
    <line x1="0" y1="0" x2="34" y2="18" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2.5" fill="#ffffff"/>
  </g>
  <g class="comet-2">
    <line x1="900" y1="0" x2="934" y2="18" stroke="#a9d8ff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="900" cy="0" r="2.2" fill="#a9d8ff"/>
  </g>

  <!-- planet A (top-left) -->
  <g class="planet-a">
    <circle cx="190" cy="90" r="34" fill="url(#planetGrad1)" opacity="0.9"/>
  </g>

  <!-- planet B with ring (bottom-right) -->
  <g class="planet-b">
    <ellipse class="ring" cx="1030" cy="220" rx="56" ry="14" fill="none" stroke="#FFD36E" stroke-width="2" opacity="0.55"/>
    <circle cx="1030" cy="220" r="26" fill="url(#planetGrad2)"/>
  </g>

  <!-- title -->
  <text x="600" y="150" text-anchor="middle" class="title" font-size="52" fill="url(#goldGrad)" filter="url(#glow)">SHRADDHA SINGH</text>
  <text x="600" y="192" text-anchor="middle" class="subtitle" font-size="20" fill="#b9c6ff">AI &amp; ML Engineer &#8226; Navigating the Data Cosmos</text>
  <text x="600" y="222" text-anchor="middle" class="subtitle" font-size="15" fill="#7d8bc7">Final-Year B.Tech &#8226; Lucknow, India</text>
</svg>
