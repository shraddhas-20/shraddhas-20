<svg width="640" height="200" viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hullMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eef1fb"/>
      <stop offset="45%" stop-color="#aab2d8"/>
      <stop offset="100%" stop-color="#454b70"/>
    </linearGradient>
    <linearGradient id="wingMetal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b7099"/>
      <stop offset="100%" stop-color="#2b2f4a"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7ef2ff"/>
      <stop offset="100%" stop-color="#2fb8e0"/>
    </linearGradient>
    <linearGradient id="engineGlow" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#c9f7ff"/>
      <stop offset="40%" stop-color="#7ef2ff"/>
      <stop offset="100%" stop-color="#7ef2ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="magentaTrim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#C06BFF"/>
    </linearGradient>
    <filter id="neonGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes hover { 0%,100%{transform:translate(0px,0px) rotate(-0.6deg)} 50%{transform:translate(-8px,-10px) rotate(0.6deg)} }
      @keyframes pulse { 0%,100%{opacity:.75; transform:scaleX(1)} 50%{opacity:1; transform:scaleX(1.08)} }
      @keyframes dash { to { stroke-dashoffset: -120; } }
      @keyframes cockpitPulse { 0%,100%{opacity:.8} 50%{opacity:1} }
      .craft{ animation: hover 6s ease-in-out infinite; transform-origin: 400px 100px; }
      .nacelle{ animation: pulse 1.4s ease-in-out infinite; transform-origin: 260px 100px; }
      .speedline{ stroke-dasharray: 14 18; animation: dash 1.1s linear infinite; }
      .cockpit{ animation: cockpitPulse 2.4s ease-in-out infinite; }
    </style>
  </defs>

  <g class="craft">
    <!-- warp speed lines trailing behind -->
    <line class="speedline" x1="230" y1="85" x2="10" y2="85" stroke="#7ef2ff" stroke-width="2" opacity="0.55" stroke-linecap="round"/>
    <line class="speedline" x1="220" y1="100" x2="0" y2="100" stroke="#c9f7ff" stroke-width="2.5" opacity="0.7" stroke-linecap="round" style="animation-delay:.2s"/>
    <line class="speedline" x1="230" y1="115" x2="10" y2="115" stroke="#7ef2ff" stroke-width="2" opacity="0.55" stroke-linecap="round" style="animation-delay:.4s"/>

    <!-- engine glow -->
    <g class="nacelle" filter="url(#softGlow)">
      <ellipse cx="258" cy="92" rx="26" ry="5" fill="url(#engineGlow)"/>
      <ellipse cx="258" cy="108" rx="26" ry="5" fill="url(#engineGlow)"/>
    </g>

    <!-- rear wings (swept, sharp) -->
    <path d="M420,88 L560,15 L470,92 Z" fill="url(#wingMetal)"/>
    <path d="M420,112 L560,185 L470,108 Z" fill="url(#wingMetal)"/>
    <path d="M420,88 L560,15 L470,92 Z" fill="none" stroke="url(#magentaTrim)" stroke-width="1.5" opacity="0.8"/>
    <path d="M420,112 L560,185 L470,108 Z" fill="none" stroke="url(#magentaTrim)" stroke-width="1.5" opacity="0.8"/>

    <!-- main fuselage: sharp wedge -->
    <path d="M610,100 L520,72 L340,64 L262,88 L262,112 L340,136 L520,128 Z" fill="url(#hullMetal)"/>
    <path d="M610,100 L520,72 L340,64 L262,88 L262,112 L340,136 L520,128 Z" fill="none" stroke="#7d8bc7" stroke-width="1" opacity="0.5"/>

    <!-- panel greebles -->
    <line x1="340" y1="70" x2="340" y2="130" stroke="#6b7099" stroke-width="1" opacity="0.6"/>
    <line x1="400" y1="66" x2="400" y2="134" stroke="#6b7099" stroke-width="1" opacity="0.5"/>
    <line x1="460" y1="70" x2="460" y2="130" stroke="#6b7099" stroke-width="1" opacity="0.5"/>
    <rect x="355" y="76" width="18" height="4" fill="#8f9ecf" opacity="0.6"/>
    <rect x="355" y="120" width="18" height="4" fill="#8f9ecf" opacity="0.6"/>

    <!-- nose accent -->
    <path d="M610,100 L560,86 L560,114 Z" fill="url(#magentaTrim)" opacity="0.9"/>

    <!-- cockpit strip -->
    <g class="cockpit" filter="url(#neonGlow)">
      <path d="M545,86 L500,80 L495,88 L545,96 Z" fill="url(#cyanGlow)"/>
    </g>
  </g>
</svg>
