<svg width="1200" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fbgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06070f"/>
      <stop offset="50%" stop-color="#150a2e"/>
      <stop offset="100%" stop-color="#05060f"/>
    </linearGradient>
    <radialGradient id="visorGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#bfe9ff"/>
      <stop offset="100%" stop-color="#4fa8d8"/>
    </radialGradient>
    <style>
      @keyframes twinkle2 { 0%,100%{opacity:.15} 50%{opacity:1} }
      @keyframes wave { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-24deg)} }
      @keyframes bob { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-6px)} }
      .fstar{ fill:#fff; animation: twinkle2 3s ease-in-out infinite; }
      .astro{ animation: bob 4s ease-in-out infinite; transform-origin: 150px 120px; }
      .arm{ animation: wave 1.6s ease-in-out infinite; transform-origin: 178px 108px; }
      .ftitle{ font-family: 'Trebuchet MS', sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="200" fill="url(#fbgGrad)"/>

  <g>
    <circle class="fstar" cx="60" cy="30" r="1.4" style="animation-delay:.2s"/>
    <circle class="fstar" cx="300" cy="20" r="1.6" style="animation-delay:1.1s"/>
    <circle class="fstar" cx="500" cy="40" r="1.2" style="animation-delay:.6s"/>
    <circle class="fstar" cx="700" cy="18" r="1.5" style="animation-delay:1.8s"/>
    <circle class="fstar" cx="900" cy="35" r="1.3" style="animation-delay:.9s"/>
    <circle class="fstar" cx="1100" cy="22" r="1.6" style="animation-delay:1.4s"/>
    <circle class="fstar" cx="1150" cy="60" r="1.2" style="animation-delay:.4s"/>
    <circle class="fstar" cx="60" cy="170" r="1.3" style="animation-delay:1.6s"/>
    <circle class="fstar" cx="1130" cy="150" r="1.4" style="animation-delay:.7s"/>
  </g>

  <!-- simple astronaut -->
  <g class="astro">
    <ellipse cx="150" cy="150" rx="22" ry="26" fill="#e7ecf5"/>
    <circle cx="150" cy="108" r="26" fill="#e7ecf5"/>
    <circle cx="150" cy="108" r="19" fill="url(#visorGrad)"/>
    <g class="arm">
      <rect x="172" y="100" width="30" height="12" rx="6" fill="#e7ecf5"/>
    </g>
    <rect x="98" y="130" width="30" height="12" rx="6" fill="#e7ecf5"/>
    <rect x="138" y="172" width="12" height="24" rx="5" fill="#c7cfe0"/>
    <rect x="160" y="172" width="12" height="24" rx="5" fill="#c7cfe0"/>
  </g>

  <text x="660" y="95" text-anchor="middle" class="ftitle" font-size="24" fill="#FFD36E">Thanks for visiting my orbit &#10022;</text>
  <text x="660" y="128" text-anchor="middle" class="ftitle" font-size="16" fill="#9db4ff">Let's build something out of this world &#128640;</text>
</svg>
